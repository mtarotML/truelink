user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml;

    upstream frontend_upstream { server frontend:3000; }
    upstream backend_upstream  { server backend:8000;  }

    # ---- HTTP (plain) ----
    # In production, uncomment the HTTPS server block below, copy your
    # fullchain.pem and privkey.pem into ./nginx/certs/, and change this
    # block to redirect everything to HTTPS.
    server {
        listen 80;
        server_name _;

        # Uncomment these two lines once HTTPS is set up:
        # return 301 https://$host$request_uri;

        location /media/ {
            alias /media/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # NextAuth (Next.js) — must go to frontend, not FastAPI
        location /api/auth/ {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # FastAPI REST (path /api/foo -> backend /foo)
        location /api/ {
            proxy_pass         http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ---- HTTPS (enable in production on your Oracle VM) ----
    # server {
    #     listen 443 ssl http2;
